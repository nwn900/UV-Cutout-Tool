name: build

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.2
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtsvg qtimageformats
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --target UVCutoutTool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uv-cutout-tool-windows
          path: build/Release/*
